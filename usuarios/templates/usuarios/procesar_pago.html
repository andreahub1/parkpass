{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Procesar Pago</title>
    <link rel="stylesheet" href="{% static 'usuarios/css/escanear.css' %}">
</head>
<body>

<header class="header">
    <h1>ParkPass</h1>
</header>

<main class="main">

    <h2 class="title">Procesar Pago</h2>

    <p><strong>Monto:</strong> ${{ boleto.monto }}</p>

    <form method="POST">
        {% csrf_token %}

        {% if metodo == "tarjeta" %}

            <div class="form-group">
                <label>Número de tarjeta</label>
                <input type="text" required>
            </div>

            <div class="form-group">
                <label>Nombre en la tarjeta</label>
                <input type="text" required>
            </div>

            <div class="form-group">
                <label>Fecha vencimiento</label>
                <input type="text" placeholder="MM/AA" required>
            </div>

            <div class="form-group">
                <label>CVV</label>
                <input type="text" required>
            </div>

        {% elif metodo == "paypal" %}

            <div class="form-group">
                <label>Correo PayPal</label>
                <input type="email" required>
            </div>

        {% endif %}

        <button type="submit" class="pay-btn">
            Confirmar Pago
        </button>

    </form>

</main>

</body>
</html>
