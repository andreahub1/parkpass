{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Escanear QR</title>
    <link rel="stylesheet" href="{% static 'usuarios/css/escanear.css' %}">
</head>
<body>

<!-- HEADER -->
<header class="header">
    <h1>ParkPass</h1>
    <a href="{% url 'logout' %}" class="logout">Cerrar sesión</a>
</header>

<main class="main">

    <h2 class="title">Escanear QR</h2>

    <!-- CUADRO LIMPIO -->
    <div class="scanner-box">
    <div id="reader"></div>
    </div>

    <a href="{% url 'inicio' %}" class="cancel-btn">
    Cancelar
</a>

    <div class="form-group">
        <label>Monto a pagar</label>
        <input type="text" id="montoInput" value="$ 0.00" disabled>
    </div>

    <div class="form-group">
        <label>Método de pago</label>
      <select id="metodoPago">
    <option value="tarjeta">Tarjeta Crédito/Débito</option>
    <option value="paypal">PayPal</option>
</select>
    </div>

    <button id="payBtn" class="pay-btn" disabled>
    Realizar pago
</button>
    </main>


<footer class="footer">
    ParkPass - Todos los derechos reservados
</footer>

<!-- LIBRERÍA QR -->
<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

<script>
let html5QrCode;
let escaneado = false;
let boletoId = null;

function startScanner() {
    html5QrCode = new Html5Qrcode("reader");

    Html5Qrcode.getCameras().then(devices => {
        if (devices && devices.length) {

            const cameraId = devices[0].id;

            html5QrCode.start(
                cameraId,
                {
                    fps: 10,
                    qrbox: { width: 250, height: 250 }
                },
                (decodedText) => {

                    if (escaneado) return;
                    escaneado = true;
                    boletoId = decodedText;

                    console.log("QR detectado:", decodedText);

                    html5QrCode.stop();

                    fetch(`/buscar-boleto/${decodedText}/`)
                        .then(response => response.json())
                        .then(data => {

                            if (data.error) {
                                alert("Boleto no encontrado");
                                escaneado = false;
                                startScanner();
                            } else {
                                document.getElementById("montoInput").value = "$ " + data.monto;
                                document.getElementById("payBtn").disabled = false;
                            }

                        })
                        .catch(error => {
                            console.error("Error:", error);
                            escaneado = false;
                            startScanner();
                        });
                }
            );
        }
    });
}

document.getElementById("payBtn").addEventListener("click", function() {

    if (!boletoId) return;

    const metodo = document.getElementById("metodoPago").value;

    window.location.href = `/procesar-pago/${boletoId}/?metodo=${metodo}`;
});

startScanner();
</script>
</body>
</html>
