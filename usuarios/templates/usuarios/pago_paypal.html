<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pago</title>

    <!-- 🔥 SWEET ALERT -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

<h2>Total a pagar: ${{ monto }} MXN</h2>

<!-- CONTENEDOR PAYPAL -->
<div id="paypal-button-container"></div>

<script>
    const boletoId = "{{ boleto_id|escapejs }}";
    const monto = "{{ monto }}";
</script>

<!-- 🔥 PAYPAL SOLO TARJETA (SIN POPUP BLANCO) -->
<script src="https://www.paypal.com/sdk/js?client-id=Ac_1GSNTbEA-7Ge-92eFMOaHAcAvB53gT5RSN-JNWfaZbdBCRfpI7PZb1l_drG-WmYIbNzM9Wl98qhFl&currency=MXN&disable-funding=paypal,venmo"></script>

<script>
paypal.Buttons({

    style: {
        layout: 'vertical',
        color: 'black',   // botón tipo tarjeta
        shape: 'rect',
        label: 'pay'
    },

    createOrder: (data, actions) => {
        return actions.order.create({
            purchase_units: [{
                amount: {
                    value: parseFloat(monto).toFixed(2)
                }
            }]
        });
    },

    onApprove: async (data, actions) => {
        try {
            await actions.order.capture();

            const response = await fetch("/confirmar-pago/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": "{{ csrf_token }}"
                },
                body: JSON.stringify({
                    boleto_id: boletoId
                })
            });

            const result = await response.json();

            if (result.status === "ok") {

                Swal.fire({
                    icon: 'success',
                    title: 'Pago exitoso',
                    text: 'El boleto ha sido pagado correctamente',
                    confirmButtonColor: '#1D546D'
                }).then(() => {
                    window.location.href = "/inicio/";
                });

            } else {
                Swal.fire({
                    icon: 'error',
                    title: 'Error',
                    text: 'No se pudo guardar el pago',
                    confirmButtonColor: '#1D546D'
                });
            }

        } catch (error) {
            console.error(error);

            Swal.fire({
                icon: 'error',
                title: 'Error',
                text: 'Ocurrió un problema en el pago',
                confirmButtonColor: '#1D546D'
            });
        }
    },

    onCancel: () => {
        Swal.fire({
            icon: 'info',
            title: 'Pago cancelado',
            text: 'No se completó el pago',
            confirmButtonColor: '#1D546D'
        });
    },

    onError: (err) => {
        console.error(err);

        Swal.fire({
            icon: 'error',
            title: 'Error con PayPal',
            text: 'Intenta nuevamente',
            confirmButtonColor: '#1D546D'
        });
    }

}).render('#paypal-button-container');
</script>

</body>
</html>
