{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recuperar contraseña</title>
    <link rel="stylesheet" href="{% static 'usuarios/css/login.css' %}">
</head>
<body>

<div class="container">
    <h2>Recuperar contraseña</h2>

    <p>Ingresa tu correo y te enviaremos un enlace para restablecer tu contraseña.</p>

    <form method="POST" id="formReset">
        {% csrf_token %}

        <div class="form-group">
            {{ form.email }}
        </div>

        <button type="submit" id="btnEnviar">Enviar enlace</button>
    </form>

    <p style="font-size:14px; margin-top:10px;">
        El correo puede tardar unos segundos en llegar.
    </p>

    <div style="margin-top:15px;">
        <a href="{% url 'login' %}">Volver al login</a>
    </div>
</div>

<script>
const form = document.getElementById("formReset");
const boton = document.getElementById("btnEnviar");

form.addEventListener("submit", function () {

    // Desactiva completamente el formulario
    boton.disabled = true;

    // Cambia texto
    boton.innerText = "Enviando...";

    // Evita que el usuario vuelva a enviar
    form.style.pointerEvents = "none";
});
</script>

</body>
</html>
