{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nueva contraseña</title>

<link rel="stylesheet" href="{% static 'usuarios/css/escanear.css' %}">

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f4f6f9;
}

/* HEADER */

.header{
    background-color:white;
    color:#061E29;
    padding:18px 24px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #e1e5e8;
}

.header h1{
    font-size:18px;
    font-weight:600;
    margin:0;
}

.logout{
    text-decoration:none;
    font-size:14px;
    color:#061E29;
}

/* CONTENEDOR CENTRAL */

.main{
    display:flex;
    justify-content:center;
    align-items:center;
    height:80vh;
}

/* CARD */

.container{
    max-width:400px;
    width:100%;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

/* TITULO */

h2{
    text-align:center;
    margin-bottom:20px;
}

/* INPUTS */

input{
    width:100%;
    padding:10px;
    margin-top:8px;
    margin-bottom:15px;
    border-radius:8px;
    border:1px solid #ccc;
}

/* BOTON */

button{
    width:100%;
    padding:12px;
    background:#1D546D;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#163F52;
}

/* ERRORES / REQUERIMIENTOS */

ul{
    font-size:13px;
    color:#555;
    margin-top:10px;
    margin-bottom:20px;
    padding-left:20px;
    line-height:1.6;
}

/* separar mejor el botón */

button{
    width:100%;
    padding:12px;
    background:#1D546D;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    margin-top:10px;
}

button:hover{
    background:#163F52;
}

</style>

</head>

<body>

<!-- HEADER -->
<header class="header">
    <h1>ParkPass</h1>
    <a href="{% url 'logout' %}" class="logout">Cerrar sesión</a>
</header>

<div class="main">

<div class="container">
    <h2>Establecer nueva contraseña</h2>

    <form method="POST">
        {% csrf_token %}
        
        <label>Nueva contraseña</label>
        {{ form.new_password1 }}

        <label>Confirmar contraseña</label>
        {{ form.new_password2 }}

        {% if form.errors %}
        <div style="color:red; font-size:14px;">
            {{ form.errors }}
        </div>
        {% endif %}

        <button type="submit">Cambiar contraseña</button>

    </form>
</div>

</div>

</body>
</html>
