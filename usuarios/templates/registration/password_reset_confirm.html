{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nueva contraseña</title>
    <link rel="stylesheet" href="{% static 'usuarios/css/escanear.css' %}">
    <style>
        body {
            background: #f4f6f9;
            font-family: Arial, sans-serif;
        }

        .container {
            max-width: 400px;
            margin: 80px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #1D546D;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #163F52;
        }

        ul {
            font-size: 13px;
            color: #555;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Establecer nueva contraseña</h2>

    <form method="POST">
        {% csrf_token %}
        
        <label>Nueva contraseña</label>
        {{ form.new_password1 }}

        <label>Confirmar contraseña</label>
        {{ form.new_password2 }}

        {% if form.errors %}
            <div style="color:red; font-size:14px;">
                {{ form.errors }}
            </div>
        {% endif %}

        <button type="submit">Cambiar contraseña</button>
    </form>
</div>

</body>
</html>
