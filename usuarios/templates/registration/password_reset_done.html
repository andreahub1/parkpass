<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Correo enviado</title>

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .container{
            background:white;
            padding:40px;
            border-radius:12px;
            box-shadow:0 8px 20px rgba(0,0,0,0.1);
            text-align:center;
            max-width:420px;
        }

        h2{
            color:#2c3e50;
            margin-bottom:15px;
        }

        p{
            color:#555;
            margin-bottom:25px;
        }

        .btn{
            display:inline-block;
            padding:12px 22px;
            background:#1D546D;
            color:white;
            text-decoration:none;
            border-radius:8px;
            font-weight:bold;
            transition:0.3s;
        }

        .btn:hover{
            background:#163F52;
        }
    </style>

</head>
<body>

<div class="container">
    <h2>Correo enviado</h2>
    <p>Si el correo existe, recibirás un enlace para restablecer tu contraseña.</p>

    <a href="{% url 'inicio' %}" class="btn">Volver al inicio</a>
</div>

</body>
</html>
