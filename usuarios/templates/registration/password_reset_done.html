<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Correo enviado</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background: #f4f6f9;
    margin:0;
}

/* HEADER */

.header{
    background-color:white;
    color:#061E29;
    padding:18px 24px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #e1e5e8;
}

.header h1{
    font-size:18px;
    font-weight:600;
    margin:0;
}

.logout{
    text-decoration:none;
    font-size:14px;
    color:#061E29;
}

/* CONTENEDOR CENTRAL */

.main{
    display:flex;
    justify-content:center;
    align-items:center;
    height:80vh;
}

/* CARD */

.container{
    background:white;
    padding:40px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
    text-align:center;
    max-width:420px;
}

/* TEXTOS */

h2{
    color:#2c3e50;
    margin-bottom:15px;
}

p{
    color:#555;
    margin-bottom:25px;
}

/* BOTON */

.btn{
    display:inline-block;
    padding:12px 22px;
    background:#1D546D;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    background:#163F52;
}

</style>
</head>

<body>

<!-- HEADER -->
<header class="header">
    <h1>ParkPass</h1>
    <a href="{% url 'logout' %}" class="logout">Cerrar sesión</a>
</header>

<div class="main">
    <div class="container">
        <h2>Correo enviado</h2>
        <p>Si el correo existe, recibirás un enlace para restablecer tu contraseña.</p>

        <a href="{% url 'inicio' %}" class="btn">Volver al inicio</a>
    </div>
</div>

</body>
</html>
